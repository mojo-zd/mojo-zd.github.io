<h4 id="包含中文字符串的倒置处理"><a href="#包含中文字符串的倒置处理" class="headerlink" title="包含中文字符串的倒置处理"></a>包含中文字符串的倒置处理</h4><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">func Reverse(s string) string &#123;</span><br><span class="line">    b := []rune(s)</span><br><span class="line">    fmt.Println(len(s)/2, len(s))</span><br><span class="line">    for i := 0; i &lt; len(s)/2; i++ &#123;</span><br><span class="line">        j := len(b) - i - 1</span><br><span class="line">        b[i], b[j] = b[j], b[i]</span><br><span class="line">    &#125;</span><br><span class="line">    return string(b)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure></div></article></div></main><footer><div class="paginator"><a href="/2018/04/12/Docker-Registry-V2认证机制，以及如何构建自己的Registy-Auth-Server/" class="next">NEXT</a></div><div class="copyright"><p>© 2017 - 2018 <a href="http://mojo-zd.github.io.git">mojo</a>, powered by <a href="https://hexo.io/" target="_blank">Hexo</a> and <a href="https://github.com/MikeCoder/hexo-theme-gandalfr" target="_blank">hexo-theme-gandalfr</a>.</p></div></footer></div><script src="//cdn.bootcss.com/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML" integrity="sha384-crwIf/BuaWM9rM65iM+dWFldgQ1Un8jWZMuh3puxb8TOY9+linwLoI7ZHZT+aekW" crossorigin="anonymous"></script><script src="//cdnjs.cloudflare.com/ajax/libs/highlight.js/9.9.0/highlight.min.js" crossorigin="anonymous"></script><script src="//cdn.bootcss.com/jquery/3.1.1/jquery.js" crossorigin="anonymous"></script><script>$(document).ready(function() { $('pre').each(function(i, block) { hljs.highlightBlock(block); }); });</script></body></html>
