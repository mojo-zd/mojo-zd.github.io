<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="X-UA-Compatible" content="IE=edge"><title> install nfs server · Mojo的博客</title><meta name="description" content="install nfs server - mojo"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="icon" href="/favicon.png"><link rel="stylesheet" href="/css/apollo.css"><link rel="search" type="application/opensearchdescription+xml" href="http://yoursite.com/atom.xml" title="Mojo的博客"></head><body><div class="wrap"><header><a href="/" class="logo-link"><img src="/favicon.png" alt="logo"></a><ul class="nav nav-list"><li class="nav-list-item"><a href="/" target="_self" class="nav-list-link">BLOG</a></li><li class="nav-list-item"><a href="/archives/" target="_self" class="nav-list-link">ARCHIVE</a></li><li class="nav-list-item"><a href="http://weibo.com/sunchongsheng" target="_blank" class="nav-list-link">WEIBO</a></li><li class="nav-list-item"><a href="https://github.com/pinggod" target="_blank" class="nav-list-link">GITHUB</a></li><li class="nav-list-item"><a href="/atom.xml" target="_self" class="nav-list-link">RSS</a></li></ul></header><main class="container"><div class="post"><article class="post-block"><h1 class="post-title">install nfs server</h1><div class="post-info">Apr 12, 2018</div><div class="post-content"><h3 id="nfs服务器安装"><a href="#nfs服务器安装" class="headerlink" title="nfs服务器安装"></a>nfs服务器安装</h3><h5 id="ENV-Linux-CentOS-7"><a href="#ENV-Linux-CentOS-7" class="headerlink" title="ENV: Linux - CentOS-7"></a>ENV: Linux - CentOS-7</h5><h5 id="Setup-1-Install-package"><a href="#Setup-1-Install-package" class="headerlink" title="Setup 1: Install package"></a>Setup 1: Install package</h5><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">yum install nfs-utils -y</span><br></pre></td></tr></table></figure>
<h5 id="Setup-2-Create-DIR-amp-Configuration"><a href="#Setup-2-Create-DIR-amp-Configuration" class="headerlink" title="Setup 2: Create DIR &amp; Configuration"></a>Setup 2: Create DIR &amp; Configuration</h5><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">mkdir /var/nfsshare</span><br><span class="line">echo &quot;/var/nfsshare 182.140.210.0/24(rw,sync,no_root_squash)&quot; &gt;&gt; /etc/exports</span><br><span class="line">multi host eg: /var/nfsshare 121.40.169.81/32(rw,sync,no_root_squash) 101.37.26.244/32(rw,sync,no_root_squash) 121.40.232.51/32(rw,sync,no_root_squash) 101.37.38.115/32(rw,sync,no_root_squash)</span><br></pre></td></tr></table></figure>
<h5 id="Setup-3-Start-Service"><a href="#Setup-3-Start-Service" class="headerlink" title="Setup 3: Start Service"></a>Setup 3: Start Service</h5><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">systemctl enable rpcbind</span><br><span class="line">systemctl enable nfs-server</span><br><span class="line">systemctl enable nfs-lock</span><br><span class="line">systemctl enable nfs-idmap </span><br><span class="line"> </span><br><span class="line">systemctl start rpcbind</span><br><span class="line">systemctl start nfs-server</span><br><span class="line">systemctl start nfs-lock</span><br><span class="line">systemctl start nfs-idmap</span><br></pre></td></tr></table></figure>
<h5 id="Setup-4-Check"><a href="#Setup-4-Check" class="headerlink" title="Setup 4: Check"></a>Setup 4: Check</h5><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">mount -t nfs 182.140.210.216:/var/nfsshare /mnt  -o vers=3,nfsvers=3</span><br><span class="line">mkdir -p /mnt/xx</span><br><span class="line">ls /var/nfsshare</span><br><span class="line">umount /mnt</span><br></pre></td></tr></table></figure></div></article></div></main><footer><div class="paginator"><a href="/2018/04/12/Harbor源码浅析/" class="prev">上一篇</a><a href="/2018/04/12/ceph对象存储为Harbor提供存储驱动/" class="next">下一篇</a></div><div class="copyright"><p>© 2015 - 2018 <a href="http://yoursite.com">mojo</a>, powered by <a href="https://hexo.io/" target="_blank">Hexo</a> and <a href="https://github.com/pinggod/hexo-theme-apollo" target="_blank">hexo-theme-apollo</a>.</p></div></footer></div><script async src="//cdn.bootcss.com/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML" integrity="sha384-crwIf/BuaWM9rM65iM+dWFldgQ1Un8jWZMuh3puxb8TOY9+linwLoI7ZHZT+aekW" crossorigin="anonymous"></script></body></html>
